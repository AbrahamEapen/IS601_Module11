name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: myappdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: module11_is601

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/myappdb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v4
        with:
          path: |
            module11_is601/venv
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('module11_is601/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          source venv/bin/activate
          playwright install chromium

      - name: Run unit tests
        run: |
          source venv/bin/activate
          pytest tests/unit/ --cov=app --cov-report=term-missing -v

      - name: Run integration tests (schema + model + DB)
        run: |
          source venv/bin/activate
          pytest tests/integration/ --cov=app --cov-append --cov-report=term-missing -v

      - name: Run e2e tests
        run: |
          source venv/bin/activate
          pytest tests/e2e/ -v

  security:
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: module11_is601

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: security
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: module11_is601
          push: true
          tags: |
            docsnoop/601_module11:latest
            docsnoop/601_module11:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=docsnoop/601_module11:cache
          cache-to: type=inline,mode=max
